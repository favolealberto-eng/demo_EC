<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>EURIX - AR Core (Stable Architecture)</title>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Inter', sans-serif;
        }

        /* ===========================
           LOGIN SCREEN
        =========================== */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0d1f3c 0%, #1a3a5c 30%, #0f2d1f 70%, #0d1f3c 100%);
            transition: opacity 0.6s ease;
        }

        #login-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        #login-screen::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -10%;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.12) 0%, transparent 70%);
            animation: pulse-bg 6s ease-in-out infinite alternate;
        }

        #login-screen::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(22, 163, 74, 0.10) 0%, transparent 70%);
            animation: pulse-bg 8s ease-in-out infinite alternate-reverse;
        }

        @keyframes pulse-bg {
            from {
                transform: scale(1);
                opacity: 0.7;
            }

            to {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        .login-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 44px 44px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .login-logo {
            width: 180px;
            margin-bottom: 32px;
            filter: drop-shadow(0 4px 16px rgba(6, 182, 212, 0.3));
        }

        .login-card h1 {
            color: #f1f5f9;
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 6px 0;
            letter-spacing: 0.3px;
            text-align: center;
        }

        .login-card .subtitle {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 400;
            margin: 0 0 36px 0;
            text-align: center;
        }

        .login-field {
            width: 100%;
            margin-bottom: 16px;
            box-sizing: border-box;
        }

        .login-field label {
            display: block;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .login-field input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1.5px solid rgba(255, 255, 255, 0.14);
            border-radius: 12px;
            color: #f1f5f9;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
        }

        .login-field input:focus {
            border-color: rgba(6, 182, 212, 0.7);
            background: rgba(255, 255, 255, 0.10);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
        }

        .login-field input::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        #login-error {
            color: #f87171;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            min-height: 20px;
            margin-bottom: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #login-error.visible {
            opacity: 1;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            margin-top: 8px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(6, 182, 212, 0.35);
            transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(6, 182, 212, 0.5);
            filter: brightness(1.08);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-footer {
            margin-top: 28px;
            color: rgba(148, 163, 184, 0.5);
            font-size: 11px;
            text-align: center;
            letter-spacing: 0.3px;
        }

        /* ===========================
           UI CONTROLS (Zoom + Pin)
        =========================== */
        #ui-controls {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .btn-minimal {
            background: rgba(13, 31, 60, 0.75);
            color: #f1f5f9;
            border: 1.5px solid rgba(6, 182, 212, 0.35);
            width: 54px;
            height: 54px;
            border-radius: 50%;
            font-size: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.45);
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
        }

        .btn-minimal:hover {
            transform: translateY(-2px) scale(1.06);
            border-color: rgba(6, 182, 212, 0.75);
            box-shadow: 0 8px 28px rgba(6, 182, 212, 0.25);
        }

        .btn-pin {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.85) 0%, rgba(8, 145, 178, 0.85) 100%);
            border-color: rgba(6, 182, 212, 0.6);
        }

        /* ===========================
           HUD MODAL
        =========================== */
        #hud-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(160deg, rgba(13, 31, 60, 0.92) 0%, rgba(15, 45, 31, 0.92) 100%);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 999999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .btn-close {
            position: absolute;
            top: 18px;
            right: 18px;
            background: rgba(239, 68, 68, 0.85);
            color: white;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
            backdrop-filter: blur(8px);
            transition: transform 0.15s, background 0.15s;
        }

        .btn-close:hover {
            transform: scale(1.1);
            background: rgba(239, 68, 68, 1);
        }

        /* CANVASES (Invisibili di base, ma attivi per il 3D) */
        .hidden-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1000;
            opacity: 0.001;
            pointer-events: none;
        }

        .canvas-pinned {
            opacity: 1 !important;
            pointer-events: auto !important;
            position: static !important;
            display: block !important;
            width: 90% !important;
            max-width: 600px !important;
            height: auto !important;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7), 0 0 0 1.5px rgba(6, 182, 212, 0.25);
            cursor: pointer;
        }

        /* ===========================
           GRAFICO / DETAIL VIEW
        =========================== */
        #detail-view {
            display: none;
            width: 90%;
            max-width: 580px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 22px;
            padding: 28px 24px 24px;
            box-sizing: border-box;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        #detail-title {
            text-align: center;
            color: #f1f5f9;
            margin-top: 0;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.4px;
        }

        #detail-chart-container {
            position: relative;
            height: 280px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 10px;
            box-sizing: border-box;
        }

        /* --- BOTTONE STANDARD DASHBOARD --- */
        .btn-back-detail {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.4px;
            cursor: pointer;
            width: 100%;
            margin-top: 6px;
            box-shadow: 0 4px 18px rgba(6, 182, 212, 0.32);
            transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
        }

        .btn-back-detail:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 26px rgba(6, 182, 212, 0.48);
            filter: brightness(1.08);
        }

        .btn-back-detail:active {
            transform: translateY(0);
        }

        /* ===========================
           CALENDARIO
        =========================== */
        #calendar-view {
            display: none;
            width: 90%;
            max-width: 500px;
            height: 80vh;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 22px;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
        }

        .cal-header {
            background: rgba(13, 31, 60, 0.8);
            color: #f1f5f9;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(6, 182, 212, 0.2);
        }

        .cal-header h2 {
            margin: 0 0 12px 0;
            font-size: 19px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .cal-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 4px;
        }

        .cal-tab {
            flex: 1;
            padding: 9px;
            text-align: center;
            color: #94a3b8;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            border-radius: 7px;
            transition: background 0.2s, color 0.2s;
        }

        .cal-tab.active {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            color: #fff;
            box-shadow: 0 2px 10px rgba(6, 182, 212, 0.3);
        }

        .cal-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.02);
            position: relative;
        }

        .cal-body::-webkit-scrollbar {
            width: 4px;
        }

        .cal-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .cal-body::-webkit-scrollbar-thumb {
            background: rgba(6, 182, 212, 0.35);
            border-radius: 4px;
        }

        .time-slot {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            height: 60px;
        }

        .time-label {
            width: 50px;
            color: #64748b;
            font-size: 13px;
            text-align: right;
            padding-right: 10px;
            transform: translateY(-10px);
        }

        .time-content {
            flex: 1;
            position: relative;
            border-left: 1px solid rgba(255, 255, 255, 0.07);
        }

        .cal-event {
            position: absolute;
            left: 8px;
            right: 8px;
            background: rgba(6, 182, 212, 0.15);
            border-left: 4px solid #06b6d4;
            color: #67e8f9;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        /* VISTA SETTIMANALE */
        .cal-week-grid {
            display: flex;
            height: 100%;
            width: 100%;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
        }

        .week-col {
            flex: 1;
            border-right: 1px solid rgba(255, 255, 255, 0.07);
            position: relative;
            background: transparent;
            min-height: 600px;
        }

        .week-col:last-child {
            border-right: none;
        }

        .week-day-header {
            text-align: center;
            padding: 10px 0;
            background: rgba(13, 31, 60, 0.5);
            font-weight: 700;
            color: #06b6d4;
            border-bottom: 1px solid rgba(6, 182, 212, 0.25);
            font-size: 12px;
            letter-spacing: 0.8px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .week-event {
            position: absolute;
            left: 2px;
            right: 2px;
            background: rgba(22, 163, 74, 0.18);
            border-left: 3px solid #16a34a;
            color: #86efac;
            padding: 4px;
            border-radius: 4px;
            font-size: 10px;
            line-height: 1.3;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-10px);
            }

            40% {
                transform: translateX(10px);
            }

            60% {
                transform: translateX(-8px);
            }

            80% {
                transform: translateX(8px);
            }
        }
    </style>
</head>

<body>

    <div id="login-screen">
        <div class="login-card">
            <img src="eurix_logo.png" alt="Eurix" class="login-logo">
            <h1>Accesso al Sistema AR</h1>
            <p class="subtitle">Inserisci le tue credenziali per continuare</p>

            <div class="login-field">
                <label for="login-user">Username</label>
                <input type="text" id="login-user" placeholder="Inserisci username" autocomplete="username">
            </div>
            <div class="login-field">
                <label for="login-pass">Password</label>
                <input type="password" id="login-pass" placeholder="Inserisci password" autocomplete="current-password">
            </div>

            <div id="login-error">Username o password errati.</div>

            <button class="login-btn" onclick="eseguiLogin()">ACCEDI</button>

            <p class="login-footer">© 2025 Eurix S.r.l. — Demo AR Platform</p>
        </div>
    </div>

    <div id="ui-controls">
        <button class="btn-minimal" onclick="cambiaZoom(1)">➕</button>
        <button class="btn-minimal" onclick="cambiaZoom(-1)">➖</button>
        <button class="btn-minimal btn-pin" onclick="pinToScreen()">📌</button>
    </div>

    <div id="hud-modal">
        <button class="btn-close" onclick="unpinFromScreen()">✖</button>
        <div id="main-view-container"></div>
        <div id="detail-view">
            <h2 id="detail-title">Andamento</h2>
            <div id="detail-chart-container"><canvas id="chart-canvas"></canvas></div>
            <button class="btn-back-detail" onclick="chiudiDettaglio()">⬅ Torna al Cruscotto</button>
        </div>
        <div id="calendar-view">
            <div class="cal-header">
                <h2 id="cal-room-name">Nome Sala</h2>
                <div class="cal-tabs">
                    <div id="tab-giorno" class="cal-tab active" onclick="mostraVistaGiorno()">Giorno</div>
                    <div id="tab-settimana" class="cal-tab" onclick="mostraVistaSettimana()">Settimana</div>
                </div>
            </div>
            <div class="cal-body" id="cal-timeline">
            </div>
            <div style="padding: 15px;">
                <button class="btn-back-detail" onclick="chiudiDettaglio()">⬅ Torna al Cruscotto</button>
            </div>
        </div>
    </div>

    <a-scene id="ar-scene" embedded
        arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;">
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // ===========================
        // LOGIN LOGIC
        // ===========================
        function eseguiLogin() {
            const user = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value;
            const errEl = document.getElementById('login-error');

            if (user === 'user' && pass === 'admin') {
                errEl.classList.remove('visible');
                const screen = document.getElementById('login-screen');
                screen.classList.add('fade-out');
                setTimeout(() => {
                    screen.style.display = 'none';
                }, 650);
            } else {
                errEl.classList.add('visible');
                const card = document.querySelector('.login-card');
                card.style.animation = 'none';
                card.offsetHeight; // reflow
                card.style.animation = 'shake 0.4s ease';
            }
        }

        // Allow pressing Enter on the password field
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('login-pass').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') eseguiLogin();
            });
            document.getElementById('login-user').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') eseguiLogin();
            });
        });

        // =========================================================
        // MOTORE AR
        // =========================================================
        let registroMacchinari = {};
        let currentMarkerId = null;
        let currentConfig = null;
        let renderLoop = null;
        let isPinned = false;
        let zoomLevels = {};
        let lastFetchedData = {};

        const uiControls = document.getElementById('ui-controls');

        // REGISTRAZIONE COMPONENTE BILLBOARD (DEVE ESSERE QUI FUORI!)
        AFRAME.registerComponent('soft-billboard', {
            tick: function () {
                if (isPinned) return;

                const cameraObj = this.el.sceneEl.camera;
                if (!cameraObj) return;

                const cameraPos = new THREE.Vector3();
                cameraObj.getWorldPosition(cameraPos);

                const worldPos = new THREE.Vector3();
                this.el.object3D.getWorldPosition(worldPos);

                const tempObj = new THREE.Object3D();
                tempObj.position.copy(worldPos);
                tempObj.lookAt(cameraPos);

                // Damping morbido dello 0.05
                this.el.object3D.quaternion.slerp(tempObj.quaternion, 0.05);
            }
        });

        // CARICAMENTO JSON E GENERAZIONE AUTOMATICA
        fetch('registro.json?nocache=' + new Date().getTime())
            .then(res => res.json())
            .then(dati => {
                registroMacchinari = dati;
                console.log("✅ JSON caricato con successo!");

                const scene = document.getElementById('ar-scene');

                Object.keys(registroMacchinari).forEach(id => {
                    const canvas = document.createElement('canvas');
                    canvas.id = `canvas-${id}`;
                    canvas.className = 'hidden-canvas';
                    document.body.appendChild(canvas);

                    const marker = document.createElement('a-marker');
                    marker.className = 'ar-marker';
                    marker.setAttribute('type', 'barcode');
                    marker.setAttribute('value', id);
                    marker.setAttribute('id', `marker-${id}`);

                    // PARAMETRI D'ORO PER LO SMOOTHING
                    marker.setAttribute('smooth', 'true');
                    marker.setAttribute('smoothCount', '5');
                    marker.setAttribute('smoothTolerance', '0.01');
                    marker.setAttribute('smoothThreshold', '5');

                    const entity = document.createElement('a-entity');
                    entity.setAttribute('id', `content-${id}`);
                    entity.classList.add('billboard');

                    // AGGANCIO DEL COMPONENTE SOFT-BILLBOARD ALL'ENTITA'
                    entity.setAttribute('soft-billboard', '');
                    entity.setAttribute('position', '0 1.5 0');

                    const plane = document.createElement('a-plane');
                    plane.setAttribute('id', `plane-${id}`);
                    plane.setAttribute('material', `src: #canvas-${id}; shader: flat; transparent: true`);

                    entity.appendChild(plane);
                    marker.appendChild(entity);
                    scene.appendChild(marker);

                    zoomLevels[id] = 1.0;
                });

                attivaRiconoscimentoMarker();
            })
            .catch(err => alert("❌ Errore caricamento JSON: " + err.message));

        // GESTIONE MARKER
        function attivaRiconoscimentoMarker() {
            document.querySelectorAll('.ar-marker').forEach(markerEl => {
                markerEl.addEventListener('markerFound', () => {
                    if (isPinned) return;

                    const id = markerEl.getAttribute('value');
                    currentMarkerId = id;
                    const config = registroMacchinari[id];

                    if (!config) return;

                    const script = document.createElement('script');
                    script.src = config.file + '?v=' + new Date().getTime();

                    script.onload = () => {
                        config.template = window[config.oggetto];
                        startRenderLoop(id, config);

                        if (!isPinned) {
                            uiControls.style.display = 'flex';
                            uiControls.style.zIndex = '10000';
                        }
                    };

                    document.head.appendChild(script);
                });

                markerEl.addEventListener('markerLost', () => {
                    const id = markerEl.getAttribute('value');
                    if (!isPinned && currentMarkerId === id) {
                        uiControls.style.display = 'none';
                        if (renderLoop) clearInterval(renderLoop);
                        currentMarkerId = null;
                    }
                });
            });
        }

        // LOOP DI DISEGNO SPECIFICO
        function startRenderLoop(id, config) {
            currentConfig = config;

            const canvas = document.getElementById('canvas-' + id);
            const ctx = canvas.getContext('2d');
            const plane = document.getElementById('plane-' + id);

            canvas.width = config.template.config.canvasW;
            canvas.height = config.template.config.canvasH;
            plane.setAttribute('width', config.template.config.planeW);
            plane.setAttribute('height', config.template.config.planeH);

            if (renderLoop) clearInterval(renderLoop);

            function tick() {
                if (!currentConfig || !currentConfig.template) return;
                currentConfig.template.fetchDati((dati) => {

                    lastFetchedData = dati;

                    currentConfig.template.draw(ctx, dati, currentConfig);
                    if (plane.getObject3D('mesh')) {
                        plane.getObject3D('mesh').material.map.needsUpdate = true;
                    }
                });
            }

            tick();
            renderLoop = setInterval(tick, 1000);
        }

        // --- INTERAZIONI: ZOOM E PIN ---
        function cambiaZoom(direzione) {
            if (currentMarkerId === null) return;
            zoomLevels[currentMarkerId] += direzione * 0.25;
            if (zoomLevels[currentMarkerId] < 0.5) zoomLevels[currentMarkerId] = 0.5;

            const s = zoomLevels[currentMarkerId];
            document.getElementById('content-' + currentMarkerId).setAttribute('scale', `${s} ${s} ${s}`);
        }

        function pinToScreen() {
            if (currentMarkerId === null) return;
            isPinned = true;
            uiControls.style.display = 'none';
            document.getElementById('hud-modal').style.display = 'flex';

            const content3D = document.getElementById('content-' + currentMarkerId);
            if (content3D) content3D.setAttribute('visible', 'false');

            const activeCanvas = document.getElementById('canvas-' + currentMarkerId);

            document.getElementById('main-view-container').innerHTML = '';
            document.getElementById('main-view-container').appendChild(activeCanvas);

            activeCanvas.classList.remove('hidden-canvas');
            activeCanvas.classList.add('canvas-pinned');
        }

        function unpinFromScreen() {
            if (currentMarkerId === null) return;
            isPinned = false;
            document.getElementById('hud-modal').style.display = 'none';
            chiudiDettaglio();

            const activeCanvas = document.getElementById('canvas-' + currentMarkerId);
            document.body.appendChild(activeCanvas);
            activeCanvas.classList.remove('canvas-pinned');
            activeCanvas.classList.add('hidden-canvas');

            const content3D = document.getElementById('content-' + currentMarkerId);
            if (content3D) content3D.setAttribute('visible', 'true');

            const marker = document.getElementById('marker-' + currentMarkerId);
            if (marker && marker.object3D && marker.object3D.visible) {
                uiControls.style.display = 'flex';
            } else {
                if (renderLoop) clearInterval(renderLoop);
                if (content3D) content3D.setAttribute('visible', 'false');
                currentMarkerId = null;
            }
        }

        // --- GESTIONE CLICK E SMISTAMENTO ---
        document.addEventListener('click', (event) => {
            if (!isPinned || !currentConfig || !currentMarkerId) return;

            const activeCanvas = document.getElementById('canvas-' + currentMarkerId);
            if (event.target !== activeCanvas) return;

            const rect = activeCanvas.getBoundingClientRect();
            const scaleX = activeCanvas.width / rect.width;
            const scaleY = activeCanvas.height / rect.height;
            const clickX = (event.clientX - rect.left) * scaleX;
            const clickY = (event.clientY - rect.top) * scaleY;

            const hitboxes = currentConfig.template.hitboxes || [];
            for (let box of hitboxes) {
                if (clickX >= box.x && clickX <= box.x + box.w && clickY >= box.y && clickY <= box.y + box.h) {

                    if (box.id === "calendario") {
                        apriCalendario();
                    } else {
                        apriDettaglio(box.id);
                    }
                    break;
                }
            }
        });

        // --- FUNZIONE: APRI CALENDARIO HTML ---
        function apriCalendario() {
            document.getElementById('main-view-container').style.display = 'none';
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('calendar-view').style.display = 'flex';

            document.getElementById('cal-room-name').innerText = currentConfig.nome;
            mostraVistaGiorno();
        }

        function mostraVistaGiorno() {
            document.getElementById('tab-giorno').classList.add('active');
            document.getElementById('tab-settimana').classList.remove('active');

            const timeline = document.getElementById('cal-timeline');
            timeline.innerHTML = '';
            timeline.style.padding = '20px';
            timeline.classList.remove('cal-week-grid');

            const oreInizio = 8;
            const oreFine = 18;
            const altezzaOra = 60;

            for (let i = oreInizio; i <= oreFine; i++) {
                const slot = document.createElement('div');
                slot.className = 'time-slot';
                slot.innerHTML = `<div class="time-label">${i}:00</div><div class="time-content" id="ora-${i}"></div>`;
                timeline.appendChild(slot);
            }

            if (lastFetchedData.agendaGiorno) {
                lastFetchedData.agendaGiorno.forEach(evento => {
                    const topPos = (evento.inizio - oreInizio) * altezzaOra;
                    const durata = evento.fine - evento.inizio;
                    const altezza = durata * altezzaOra;

                    const divEvento = document.createElement('div');
                    divEvento.className = 'cal-event';
                    divEvento.style.top = `${topPos + 1}px`;
                    divEvento.style.height = `${altezza - 2}px`;

                    const formattaOra = (num) => {
                        const h = Math.floor(num);
                        const m = (num % 1 === 0.5) ? "30" : "00";
                        return `${h}:${m}`;
                    };

                    divEvento.innerHTML = `<strong>${evento.titolo}</strong><br><span style="font-weight:normal; font-size:12px;">${formattaOra(evento.inizio)} - ${formattaOra(evento.fine)}</span>`;
                    document.getElementById(`ora-${oreInizio}`).appendChild(divEvento);
                });
            }
        }

        function mostraVistaSettimana() {
            document.getElementById('tab-settimana').classList.add('active');
            document.getElementById('tab-giorno').classList.remove('active');

            const timeline = document.getElementById('cal-timeline');
            timeline.innerHTML = '';
            timeline.style.padding = '0';
            timeline.classList.add('cal-week-grid');

            const giorni = ["Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì"];
            const oreInizio = 8;
            const altezzaOra = 60;

            if (lastFetchedData.agendaSettimana) {
                giorni.forEach(giorno => {
                    const col = document.createElement('div');
                    col.className = 'week-col';

                    const header = document.createElement('div');
                    header.className = 'week-day-header';
                    header.innerText = giorno.substring(0, 3).toUpperCase();
                    col.appendChild(header);

                    for (let i = oreInizio; i <= 18; i++) {
                        const line = document.createElement('div');
                        line.style.cssText = `position:absolute; top:${(i - oreInizio) * altezzaOra + 40}px; width:100%; border-top:1px dashed rgba(255,255,255,0.08); pointer-events:none;`;
                        col.appendChild(line);
                    }

                    const eventiDelGiorno = lastFetchedData.agendaSettimana[giorno] || [];
                    eventiDelGiorno.forEach(evento => {
                        const topPos = (evento.inizio - oreInizio) * altezzaOra + 40;
                        const durata = evento.fine - evento.inizio;
                        const altezza = durata * altezzaOra;

                        const divEvento = document.createElement('div');
                        divEvento.className = 'week-event';
                        divEvento.style.top = `${topPos}px`;
                        divEvento.style.height = `${altezza - 2}px`;
                        divEvento.innerText = evento.titolo;

                        col.appendChild(divEvento);
                    });

                    timeline.appendChild(col);
                });
            } else {
                timeline.innerHTML = "<div style='padding:20px; text-align:center; width:100%; color:#94a3b8;'>Dati della settimana non disponibili.</div>";
            }
        }

        // --- FUNZIONI GRAFICI E CHIUSURA ---
        let detailChart = null;
        function apriDettaglio(metricaId) {
            document.getElementById('main-view-container').style.display = 'none';
            document.getElementById('calendar-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'flex';

            let titolo = metricaId.toUpperCase();
            if (metricaId === 'iaq_score') titolo = "QUALITÀ DELL'ARIA";
            if (metricaId === 'benchmark_energia') titolo = "CONSUMO REALE VS BASELINE";
            document.getElementById('detail-title').innerText = "Andamento: " + titolo;

            let theDatasets = [];
            const labels = ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', 'Ora'];
            let unita = "";

            if (metricaId === 'benchmark_energia') {
                unita = "kWh";
                const fakeData = [];
                const baselineData = [];
                const baseline = lastFetchedData && lastFetchedData.baseline_enpi ? lastFetchedData.baseline_enpi : 12.5;
                for (let i = 0; i < 10; i++) {
                    baselineData.push(baseline);
                    const diff = (Math.random() * 4) - 1.5;
                    fakeData.push((baseline + diff).toFixed(1));
                }

                theDatasets = [
                    {
                        label: 'Consumo Reale',
                        data: fakeData,
                        borderColor: '#06b6d4',
                        backgroundColor: 'rgba(6,182,212,0.12)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 5,
                        pointBackgroundColor: '#06b6d4',
                        pointBorderColor: 'rgba(255,255,255,0.3)',
                        pointBorderWidth: 2
                    },
                    {
                        label: 'Baseline ISO 50001',
                        data: baselineData,
                        borderColor: '#22c55e',
                        backgroundColor: 'transparent',
                        borderDash: [5, 5],
                        fill: false,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 0
                    }
                ];
            } else {
                let baseVal = 0, variazione = 0;
                if (metricaId === 'temperatura') { baseVal = 19; variazione = 4; unita = "°C"; }
                else if (metricaId === 'umidita') { baseVal = 40; variazione = 15; unita = "%"; }
                else if (metricaId === 'rumore') { baseVal = 40; variazione = 20; unita = "dB"; }
                else if (metricaId === 'luce') { baseVal = 400; variazione = 150; unita = "lux"; }
                else if (metricaId === 'iaq_score') { baseVal = 8.5; variazione = 0.8; unita = "Punti"; }

                const fakeData = [];
                for (let i = 0; i < 10; i++) {
                    const trend = Math.sin(i / 9 * Math.PI) * variazione;
                    const rumoreDiff = (Math.random() * variazione * 0.3) - (variazione * 0.15);
                    fakeData.push((baseVal + trend + rumoreDiff).toFixed(1));
                }

                theDatasets = [{
                    label: metricaId,
                    data: fakeData,
                    borderColor: '#06b6d4',
                    backgroundColor: 'rgba(6,182,212,0.12)',
                    fill: true,
                    tension: 0.4,
                    borderWidth: 3,
                    pointRadius: 5,
                    pointBackgroundColor: '#06b6d4',
                    pointBorderColor: 'rgba(255,255,255,0.3)',
                    pointBorderWidth: 2
                }];
            }

            const ctxChart = document.getElementById('chart-canvas').getContext('2d');
            if (detailChart) detailChart.destroy();

            detailChart = new Chart(ctxChart, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: theDatasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: {
                            ticks: { color: '#94a3b8', font: { size: 11 } },
                            grid: { color: 'rgba(255,255,255,0.06)' }
                        },
                        y: {
                            title: { display: true, text: unita, color: '#94a3b8', font: { size: 13, weight: '600' } },
                            ticks: { maxTicksLimit: 6, color: '#94a3b8' },
                            grid: { color: 'rgba(255,255,255,0.06)' },
                            beginAtZero: false
                        }
                    }
                }
            });
        }

        function chiudiDettaglio() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('calendar-view').style.display = 'none';
            document.getElementById('main-view-container').style.display = 'block';
        }
    </script>
</body>
