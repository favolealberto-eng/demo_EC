<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>EURIX - AR Core Engine (Live & Interactive)</title>

    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="layouts/layout_iaq.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        #ui-controls {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .btn-minimal {
            background: rgba(15, 23, 42, 0.6);
            color: #ffffff;
            border: 2px solid rgba(255, 255, 255, 0.4);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-pin {
            background: rgba(249, 115, 22, 0.8);
        }

        #hud-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 999999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .btn-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ef4444;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
        }

        /* BORDINO BLU RIMOSSO! */
        .canvas-pinned {
            display: block !important;
            width: 90% !important;
            max-width: 600px !important;
            height: auto !important;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
        }

        /* Stili per la vista Dettaglio (Grafico) */
        #detail-view {
            display: none;
            width: 90%;
            max-width: 600px;
            background: #ffffff;
            border-radius: 20px;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
            flex-direction: column;
            gap: 15px;
        }

        #detail-title {
            text-align: center;
            color: #334155;
            margin-top: 0;
            font-size: 24px;
            text-transform: uppercase;
        }

        #detail-chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        .btn-back-detail {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div id="ui-controls">
        <button class="btn-minimal" onclick="cambiaZoom(1)">➕</button>
        <button class="btn-minimal" onclick="cambiaZoom(-1)">➖</button>
        <button class="btn-minimal btn-pin" onclick="pinToScreen()">📌</button>
    </div>

    <div id="hud-modal">
        <button class="btn-close" onclick="unpinFromScreen()">✖</button>

        <div id="main-view-container"></div>

        <div id="detail-view">
            <h2 id="detail-title">Andamento Giornaliero</h2>
            <div id="detail-chart-container">
                <canvas id="chart-canvas"></canvas>
            </div>
            <button class="btn-back-detail" onclick="chiudiDettaglio()">⬅ Torna al Cruscotto</button>
        </div>
    </div>

    <canvas id="canvas-core" style="display:none;"></canvas>

    <a-scene embedded
        arjs="sourceType: webcam; sourceWidth: 1280; sourceHeight: 720; displayWidth: 1280; displayHeight: 720; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;"
        renderer="antialias: true; logarithmicDepthBuffer: true; alpha: true;">

        <a-marker class="ar-marker" type="barcode" value="0" emitevents="true" smooth="true" smoothCount="7"
            smoothTolerance="0.02" smoothThreshold="5"></a-marker>

        <a-marker class="ar-marker" type="barcode" value="1" emitevents="true" smooth="true" smoothCount="7"
            smoothTolerance="0.02" smoothThreshold="5">
            <a-entity id="content-core" rotation="-75 0 0" visible="false">
                <a-plane id="plane-core" position="0 1.5 0"
                    material="src: #canvas-core; shader: flat; transparent: true"></a-plane>
            </a-entity>
        </a-marker>

        <a-entity id="main-camera" camera look-controls="enabled: false" wasd-controls="enabled: false"></a-entity>
    </a-scene>

    <script>
        const registroMacchinari = {
            "0": { tipo: "macchina_caffe", nome: "Macchinetta Area Break" },
            "1": { tipo: "Sensore IAQ", nome: "Sensore IAQ", template: (typeof LayoutIAQ !== 'undefined') ? LayoutIAQ : null }
        };

        const canvasCore = document.getElementById('canvas-core');
        const planeCore = document.getElementById('plane-core');
        const ctx = canvasCore.getContext('2d');
        const content3D = document.getElementById('content-core');

        let currentConfig = null;
        let renderLoop = null;

        // ==========================================
        // MOTORE DI AGGIORNAMENTO LIVE (1 SECONDO)
        // ==========================================
        function startRenderLoop(config) {
            currentConfig = config;

            // Imposta dimensioni una volta sola
            canvasCore.width = config.template.config.canvasW;
            canvasCore.height = config.template.config.canvasH;
            planeCore.setAttribute('width', config.template.config.planeW);
            planeCore.setAttribute('height', config.template.config.planeH);

            // Ferma eventuali loop precedenti
            if (renderLoop) clearInterval(renderLoop);

            // Funzione di disegno
            function tick() {
                config.template.fetchDati((dati) => {
                    config.template.draw(ctx, dati);
                    if (planeCore.getObject3D('mesh')) {
                        planeCore.getObject3D('mesh').material.map.needsUpdate = true;
                    }
                });
            }

            tick(); // Disegna subito il primo frame
            renderLoop = setInterval(tick, 1000); // Poi aggiorna ogni secondo
        }

        // ==========================================
        // GESTIONE MARKER
        // ==========================================
        let isPinned = false;
        const uiControls = document.getElementById('ui-controls');

        const scaleZoom = [0.5, 0.75, 1.0, 1.5, 2.0];
        let indiceZoom = 2;
        function cambiaZoom(direzione) {
            indiceZoom += direzione;
            if (indiceZoom < 0) indiceZoom = 0;
            if (indiceZoom >= scaleZoom.length) indiceZoom = scaleZoom.length - 1;
            const s = scaleZoom[indiceZoom];
            content3D.setAttribute('scale', `${s} ${s} ${s}`);
        }

        document.querySelectorAll('.ar-marker').forEach(markerEl => {
            markerEl.addEventListener('markerFound', (e) => {
                const markerId = e.target.getAttribute('value');
                const config = registroMacchinari[markerId];

                if (config && config.template) {
                    if (content3D.parentNode !== markerEl) markerEl.appendChild(content3D);
                    content3D.setAttribute('visible', 'true');

                    startRenderLoop(config); // Avvia l'orologio!

                    if (!isPinned) uiControls.style.display = 'flex';
                }
            });

            markerEl.addEventListener('markerLost', () => {
                if (!isPinned) {
                    uiControls.style.display = 'none';
                    content3D.setAttribute('visible', 'false');
                    if (renderLoop) clearInterval(renderLoop); // Spegni l'orologio se non è inquadrato e non è pinnato
                }
            });
        });

        // ==========================================
        // PIN A SCHERMO
        // ==========================================
        function pinToScreen() {
            isPinned = true;
            uiControls.style.display = 'none';
            document.getElementById('hud-modal').style.display = 'flex';
            content3D.setAttribute('visible', 'false');
            document.getElementById('main-view-container').appendChild(canvasCore);
            canvasCore.classList.add('canvas-pinned');
        }

        function unpinFromScreen() {
            isPinned = false;
            document.getElementById('hud-modal').style.display = 'none';
            chiudiDettaglio(); // Chiude il grafico se era aperto
            document.body.appendChild(canvasCore);
            canvasCore.classList.remove('canvas-pinned');
            content3D.setAttribute('visible', 'true');

            if (content3D.parentNode && content3D.parentNode.object3D.visible) {
                uiControls.style.display = 'flex';
            } else {
                content3D.setAttribute('visible', 'false');
                if (renderLoop) clearInterval(renderLoop);
            }
        }

        // ==========================================
        // INTERATTIVITÀ: CLICK SUI PULSANTI DEL CANVAS
        // ==========================================
        canvasCore.addEventListener('click', (event) => {
            if (!isPinned || !currentConfig) return; // Funziona solo se è bloccato a schermo

            // Calcolo matematico per capire dove hai toccato, indipendentemente dalla dimensione dello schermo
            const rect = canvasCore.getBoundingClientRect();
            const scaleX = canvasCore.width / rect.width;
            const scaleY = canvasCore.height / rect.height;
            const clickX = (event.clientX - rect.left) * scaleX;
            const clickY = (event.clientY - rect.top) * scaleY;

            // Controlla se il touch è caduto in una delle hitbox definite nel file layout_iaq.js
            const hitboxes = currentConfig.template.hitboxes || [];
            for (let box of hitboxes) {
                if (clickX >= box.x && clickX <= box.x + box.w && clickY >= box.y && clickY <= box.y + box.h) {
                    apriDettaglio(box.id); // Apri il grafico per quella metrica!
                    break;
                }
            }
        });

        // ==========================================
        // GESTIONE GRAFICO (Chart.js)
        // ==========================================
        let detailChart = null;

        function apriDettaglio(metricaId) {
            // UI Switch: Nascondi il cruscotto e mostra il grafico
            document.getElementById('main-view-container').style.display = 'none';
            document.getElementById('detail-view').style.display = 'flex';
            document.getElementById('detail-title').innerText = "Andamento: " + metricaId.toUpperCase();

            // Generazione Dati Finti per la demo (es. 10 punti dati casuali)
            const fakeData = Array.from({ length: 10 }, () => Math.floor(Math.random() * 50) + 10);
            const labels = ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', 'Ora'];

            const ctxChart = document.getElementById('chart-canvas').getContext('2d');

            if (detailChart) detailChart.destroy(); // Distruggi il grafico vecchio se esiste

            // Crea il nuovo grafico bellissimo
            detailChart = new Chart(ctxChart, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: metricaId,
                        data: fakeData,
                        borderColor: '#22c55e', // Verde acceso
                        backgroundColor: 'rgba(34, 197, 94, 0.2)', // Verde trasparente
                        fill: true, tension: 0.4, borderWidth: 4, pointRadius: 6
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { suggestedMin: 0 } }
                }
            });
        }

        function chiudiDettaglio() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('main-view-container').style.display = 'block';
        }
    </script>
</body>

</html>
