<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Tabula Rasa AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

    <canvas id="canvas-0" width="500" height="500" style="display: none;"></canvas>
    <canvas id="canvas-1" width="500" height="500" style="display: none;"></canvas>

    <a-scene embedded
        arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;">

        <a-marker type="barcode" value="0" id="marker-0">
            <a-plane position="0 0.5 0" rotation="-90 0 0" width="2" height="2" material="src: #canvas-0"></a-plane>
        </a-marker>

        <a-marker type="barcode" value="1" id="marker-1">
            <a-plane position="0 0.5 0" rotation="-90 0 0" width="2" height="2" material="src: #canvas-1"></a-plane>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // 1. Appena si apre la pagina, scarico il JSON (aggiungo nocache per sicurezza)
        fetch('registro.json?nocache=' + new Date().getTime())
            .then(response => response.json())
            .then(registro => {
                console.log("✅ JSON Caricato:", registro);
                avviaRiconoscimento(registro);
            })
            .catch(errore => alert("❌ Errore caricamento JSON: " + errore));

        // 2. Funzione che si attiva solo se il JSON è stato caricato
        function avviaRiconoscimento(registro) {

            // Per ogni marker presente sulla scena...
            document.querySelectorAll('a-marker').forEach(marker => {
                marker.addEventListener('markerFound', () => {

                    const id = marker.getAttribute('value');
                    const config = registro[id];

                    if (!config) return; // Se il marker non è nel JSON, ignora

                    // 3. Scarica il file JavaScript esterno
                    const script = document.createElement('script');
                    script.src = config.file;

                    script.onload = () => {
                        console.log(`✅ File ${config.file} caricato per il Marker ${id}`);

                        // 4. Prendi il Canvas giusto, l'oggetto JS giusto e fallo disegnare
                        const canvas = document.getElementById('canvas-' + id);
                        const ctx = canvas.getContext('2d');

                        const layoutObj = window[config.oggetto];
                        layoutObj.disegna(ctx);

                        // 5. Avvisa la scheda video di aggiornare l'ologramma
                        const plane = marker.querySelector('a-plane');
                        if (plane.getObject3D('mesh')) {
                            plane.getObject3D('mesh').material.map.needsUpdate = true;
                        }
                    };

                    // Se il file è già stato caricato prima, Javascript non lo ricarica e dà un warning innocuo, 
                    // ma per questo test tabula rasa andrà benissimo ricaricarlo.
                    document.head.appendChild(script);
                });
            });
        }
    </script>
</body>

</html>
