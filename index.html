<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>EURIX - AR Core (Stable Architecture)</title>

    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        /* UI CONTROLS */
        #ui-controls {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .btn-minimal {
            background: rgba(15, 23, 42, 0.6);
            color: #ffffff;
            border: 2px solid rgba(255, 255, 255, 0.4);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-pin {
            background: rgba(249, 115, 22, 0.8);
        }

        /* MODALE */
        #hud-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 999999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .btn-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ef4444;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
        }

        /* CANVASES (Invisibili di base, ma attivi per il 3D) */
        .hidden-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1000;
            opacity: 0.001;
            pointer-events: none;
        }

        .canvas-pinned {
            opacity: 1 !important;
            pointer-events: auto !important;
            position: static !important;
            display: block !important;
            width: 90% !important;
            max-width: 600px !important;
            height: auto !important;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
            cursor: pointer;
        }

        /* GRAFICO */
        #detail-view {
            display: none;
            width: 90%;
            max-width: 600px;
            background: #ffffff;
            border-radius: 20px;
            padding: 25px;
            box-sizing: border-box;
            flex-direction: column;
            gap: 15px;
        }

        #detail-title {
            text-align: center;
            color: #334155;
            margin-top: 0;
            font-size: 24px;
        }

        #detail-chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        .btn-back-detail {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div id="ui-controls">
        <button class="btn-minimal" onclick="cambiaZoom(1)">➕</button>
        <button class="btn-minimal" onclick="cambiaZoom(-1)">➖</button>
        <button class="btn-minimal btn-pin" onclick="pinToScreen()">📌</button>
    </div>

    <div id="hud-modal">
        <button class="btn-close" onclick="unpinFromScreen()">✖</button>
        <div id="main-view-container"></div>
        <div id="detail-view">
            <h2 id="detail-title">Andamento</h2>
            <div id="detail-chart-container"><canvas id="chart-canvas"></canvas></div>
            <button class="btn-back-detail" onclick="chiudiDettaglio()">⬅ Torna al Cruscotto</button>
        </div>
    </div>

    <canvas id="canvas-0" class="hidden-canvas"></canvas>
    <canvas id="canvas-1" class="hidden-canvas"></canvas>
    <canvas id="canvas-2" class="hidden-canvas"></canvas>
    <canvas id="canvas-3" class="hidden-canvas"></canvas>
    <canvas id="canvas-4" class="hidden-canvas"></canvas>

    <a-scene embedded
        arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;">

        <a-marker class="ar-marker" type="barcode" value="0" id="marker-0" smooth="true" smoothCount="10"
            smoothTolerance="0.05" smoothThreshold="2">
            <a-entity id="content-0" rotation="-75 0 0">
                <a-plane id="plane-0" position="0 1.5 0"
                    material="src: #canvas-0; shader: flat; transparent: true"></a-plane>
            </a-entity>
        </a-marker>

        <a-marker class="ar-marker" type="barcode" value="1" id="marker-1" smooth="true" smoothCount="10"
            smoothTolerance="0.05" smoothThreshold="2">
            <a-entity id="content-1" rotation="-75 0 0">
                <a-plane id="plane-1" position="0 1.5 0"
                    material="src: #canvas-1; shader: flat; transparent: true"></a-plane>
            </a-entity>
        </a-marker>

        <a-marker class="ar-marker" type="barcode" value="2" id="marker-2" smooth="true" smoothCount="10"
            smoothTolerance="0.05" smoothThreshold="2">
            <a-entity id="content-2" rotation="-75 0 0">
                <a-plane id="plane-2" position="0 1.5 0"
                    material="src: #canvas-2; shader: flat; transparent: true"></a-plane>
            </a-entity>
        </a-marker>

        <a-marker class="ar-marker" type="barcode" value="3" id="marker-3" smooth="true" smoothCount="10"
            smoothTolerance="0.05" smoothThreshold="2">
            <a-entity id="content-3" rotation="-75 0 0">
                <a-plane id="plane-3" position="0 1.5 0"
                    material="src: #canvas-3; shader: flat; transparent: true"></a-plane>
            </a-entity>
        </a-marker>

        <a-marker class="ar-marker" type="barcode" value="4" id="marker-4" smooth="true" smoothCount="10"
            smoothTolerance="0.05" smoothThreshold="2">
            <a-entity id="content-4" rotation="-75 0 0">
                <a-plane id="plane-4" position="0 1.5 0"
                    material="src: #canvas-4; shader: flat; transparent: true"></a-plane>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        let registroMacchinari = {};

        // VARIABILI DI STATO
        let currentMarkerId = null;
        let currentConfig = null;
        let renderLoop = null;
        let isPinned = false;
        let zoomLevels = { "0": 1.0, "1": 1.0 }; // Zoom indipendente per ogni marker

        const uiControls = document.getElementById('ui-controls');

        // CARICAMENTO JSON
        fetch('registro.json?nocache=' + new Date().getTime())
            .then(res => res.json())
            .then(dati => {
                registroMacchinari = dati;
                console.log("✅ JSON caricato con successo!");
            })
            .catch(err => alert("❌ Errore caricamento JSON: " + err.message));

        // GESTIONE MARKER
        document.querySelectorAll('.ar-marker').forEach(markerEl => {
            markerEl.addEventListener('markerFound', () => {
                const id = markerEl.getAttribute('value');
                currentMarkerId = id;
                const config = registroMacchinari[id];

                if (!config) return;

                const script = document.createElement('script');
                script.src = config.file;

                script.onload = () => {
                    config.template = window[config.oggetto];
                    startRenderLoop(id, config);
                    if (!isPinned) uiControls.style.display = 'flex';
                };

                document.head.appendChild(script);
            });

            markerEl.addEventListener('markerLost', () => {
                const id = markerEl.getAttribute('value');
                if (!isPinned && currentMarkerId === id) {
                    uiControls.style.display = 'none';
                    if (renderLoop) clearInterval(renderLoop);
                    currentMarkerId = null;
                }
            });
        });

        // LOOP DI DISEGNO SPECIFICO
        function startRenderLoop(id, config) {
            currentConfig = config;

            // Prendiamo il canvas e il piano SPECIFICI per questo marker
            const canvas = document.getElementById('canvas-' + id);
            const ctx = canvas.getContext('2d');
            const plane = document.getElementById('plane-' + id);

            // Adattiamo le dimensioni
            canvas.width = config.template.config.canvasW;
            canvas.height = config.template.config.canvasH;
            plane.setAttribute('width', config.template.config.planeW);
            plane.setAttribute('height', config.template.config.planeH);

            if (renderLoop) clearInterval(renderLoop);

            function tick() {
                if (!currentConfig || !currentConfig.template) return;
                currentConfig.template.fetchDati((dati) => {
                    currentConfig.template.draw(ctx, dati, currentConfig);
                    // Aggiorniamo la GPU per questo specifico piano
                    if (plane.getObject3D('mesh')) {
                        plane.getObject3D('mesh').material.map.needsUpdate = true;
                    }
                });
            }

            tick();
            renderLoop = setInterval(tick, 1000);
        }

        // --- INTERAZIONI: ZOOM E PIN ---
        function cambiaZoom(direzione) {
            if (currentMarkerId === null) return;
            zoomLevels[currentMarkerId] += direzione * 0.25;
            if (zoomLevels[currentMarkerId] < 0.5) zoomLevels[currentMarkerId] = 0.5;

            const s = zoomLevels[currentMarkerId];
            document.getElementById('content-' + currentMarkerId).setAttribute('scale', `${s} ${s} ${s}`);
        }

        function pinToScreen() {
            if (currentMarkerId === null) return;
            isPinned = true;
            uiControls.style.display = 'none';
            document.getElementById('hud-modal').style.display = 'flex';

            const activeCanvas = document.getElementById('canvas-' + currentMarkerId);
            document.getElementById('main-view-container').appendChild(activeCanvas);
            activeCanvas.classList.remove('hidden-canvas');
            activeCanvas.classList.add('canvas-pinned');
        }

        function unpinFromScreen() {
            if (currentMarkerId === null) return;
            isPinned = false;
            document.getElementById('hud-modal').style.display = 'none';
            chiudiDettaglio();

            const activeCanvas = document.getElementById('canvas-' + currentMarkerId);
            document.body.appendChild(activeCanvas);
            activeCanvas.classList.remove('canvas-pinned');
            activeCanvas.classList.add('hidden-canvas');

            const marker = document.getElementById('marker-' + currentMarkerId);
            if (marker && marker.object3D.visible) {
                uiControls.style.display = 'flex';
            } else {
                if (renderLoop) clearInterval(renderLoop);
                currentMarkerId = null;
            }
        }

        // --- GESTIONE CLICK E GRAFICI ---
        document.addEventListener('click', (event) => {
            // Controlla il click solo se c'è un canvas pinnato
            if (!isPinned || !currentConfig || !currentMarkerId) return;

            const activeCanvas = document.getElementById('canvas-' + currentMarkerId);
            if (event.target !== activeCanvas) return; // Se clicchi fuori dal canvas, ignora

            const rect = activeCanvas.getBoundingClientRect();
            const scaleX = activeCanvas.width / rect.width;
            const scaleY = activeCanvas.height / rect.height;
            const clickX = (event.clientX - rect.left) * scaleX;
            const clickY = (event.clientY - rect.top) * scaleY;

            const hitboxes = currentConfig.template.hitboxes || [];
            for (let box of hitboxes) {
                if (clickX >= box.x && clickX <= box.x + box.w && clickY >= box.y && clickY <= box.y + box.h) {
                    apriDettaglio(box.id); break;
                }
            }
        });

        let detailChart = null;
        function apriDettaglio(metricaId) {
            document.getElementById('main-view-container').style.display = 'none';
            document.getElementById('detail-view').style.display = 'flex';

            let titolo = metricaId.toUpperCase();
            if (metricaId === 'iaq_score') titolo = "QUALITÀ DELL'ARIA";
            document.getElementById('detail-title').innerText = "Andamento: " + titolo;

            let baseVal = 0, variazione = 0, unita = "";
            if (metricaId === 'temperatura') { baseVal = 19; variazione = 4; unita = "°C"; }
            else if (metricaId === 'umidita') { baseVal = 40; variazione = 15; unita = "%"; }
            else if (metricaId === 'rumore') { baseVal = 40; variazione = 20; unita = "dB"; }
            else if (metricaId === 'luce') { baseVal = 400; variazione = 150; unita = "lux"; }
            else if (metricaId === 'iaq_score') { baseVal = 8.5; variazione = 0.8; unita = "Punti"; }

            const fakeData = [];
            for (let i = 0; i < 10; i++) {
                const trend = Math.sin(i / 9 * Math.PI) * variazione;
                const rumoreDiff = (Math.random() * variazione * 0.3) - (variazione * 0.15);
                fakeData.push((baseVal + trend + rumoreDiff).toFixed(1));
            }

            const labels = ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', 'Ora'];
            const ctxChart = document.getElementById('chart-canvas').getContext('2d');
            if (detailChart) detailChart.destroy();

            detailChart = new Chart(ctxChart, {
                type: 'line', data: { labels: labels, datasets: [{ label: metricaId, data: fakeData, borderColor: '#22c55e', backgroundColor: 'rgba(34, 197, 94, 0.2)', fill: true, tension: 0.4, borderWidth: 4, pointRadius: 6 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { title: { display: true, text: unita, font: { size: 14, weight: 'bold' } }, ticks: { maxTicksLimit: 6 }, beginAtZero: false } } }
            });
        }
        function chiudiDettaglio() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('main-view-container').style.display = 'block';
        }
    </script>
</body>

</html>
