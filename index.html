<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>EURIX - AR Core Engine (DEMO_EC)</title>

    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        #ui-controls {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .btn-minimal {
            background: rgba(15, 23, 42, 0.6);
            color: #ffffff;
            border: 2px solid rgba(255, 255, 255, 0.4);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-pin {
            background: rgba(249, 115, 22, 0.8);
        }

        #hud-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 999999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .btn-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ef4444;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
        }

        /* FIX DEFINTIVO: Il canvas è invisibile ma tecnicamente "in campo" e renderizzato */
        #canvas-core {
            position: absolute;
            top: -9999px;
            left: -9999px;
            opacity: 0;
            pointer-events: none;
        }

        .canvas-pinned {
            opacity: 1 !important;
            pointer-events: auto !important;
            position: static !important;
            display: block !important;
            width: 90% !important;
            max-width: 600px !important;
            height: auto !important;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
            cursor: pointer;
        }

        #detail-view {
            display: none;
            width: 90%;
            max-width: 600px;
            background: #ffffff;
            border-radius: 20px;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
            flex-direction: column;
            gap: 15px;
        }

        #detail-title {
            text-align: center;
            color: #334155;
            margin-top: 0;
            font-size: 24px;
            text-transform: uppercase;
        }

        #detail-chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        .btn-back-detail {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div id="ui-controls">
        <button class="btn-minimal" onclick="cambiaZoom(1)">➕</button>
        <button class="btn-minimal" onclick="cambiaZoom(-1)">➖</button>
        <button class="btn-minimal btn-pin" onclick="pinToScreen()">📌</button>
    </div>

    <div id="hud-modal">
        <button class="btn-close" onclick="unpinFromScreen()">✖</button>
        <div id="main-view-container"></div>
        <div id="detail-view">
            <h2 id="detail-title">Andamento</h2>
            <div id="detail-chart-container">
                <canvas id="chart-canvas"></canvas>
            </div>
            <button class="btn-back-detail" onclick="chiudiDettaglio()">⬅ Torna al Cruscotto</button>
        </div>
    </div>

    <canvas id="canvas-core"></canvas>

    <a-scene embedded
        arjs="sourceType: webcam; sourceWidth: 1280; sourceHeight: 720; displayWidth: 1280; displayHeight: 720; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;"
        renderer="antialias: true; logarithmicDepthBuffer: true; alpha: true;">

        <a-marker class="ar-marker" type="barcode" value="0" emitevents="true" smooth="true" smoothCount="7"
            smoothTolerance="0.02" smoothThreshold="5"></a-marker>
        <a-marker class="ar-marker" type="barcode" value="1" emitevents="true" smooth="true" smoothCount="7"
            smoothTolerance="0.02" smoothThreshold="5">
            <a-entity id="content-core" rotation="-75 0 0" visible="false">
                <a-plane id="plane-core" position="0 1.5 0"
                    material="src: #canvas-core; shader: flat; transparent: true"></a-plane>
            </a-entity>
        </a-marker>

        <a-entity id="main-camera" camera look-controls="enabled: false" wasd-controls="enabled: false"></a-entity>
    </a-scene>

    <script>
        // ==========================================
        // 1. DATABASE LOCALE
        // ==========================================
        const registroMacchinari = {
            "0": {
                "tipo": "iaq",
                "nome": "SENSORE IAQ 1",
                "template_file": "layouts/layout_iaq.js",
                "template_obj": "LayoutIAQ"
            },
            "1": {
                "tipo": "iaq",
                "nome": "SENSORE IAQ 2",
                "template_file": "layouts/layout_iaq.js",
                "template_obj": "LayoutIAQ"
            }
        };

        function caricaTemplateJS(urlFile, nomeOggetto) {
            return new Promise((resolve, reject) => {
                if (window[nomeOggetto]) return resolve(window[nomeOggetto]);

                const script = document.createElement('script');
                script.src = urlFile;
                script.onload = () => resolve(window[nomeOggetto]);
                script.onerror = () => reject(new Error(`File ${urlFile} non trovato`));
                document.head.appendChild(script);
            });
        }

        const canvasCore = document.getElementById('canvas-core');
        const planeCore = document.getElementById('plane-core');
        const ctx = canvasCore.getContext('2d');
        const content3D = document.getElementById('content-core');

        let currentConfig = null;
        let renderLoop = null;

        function startRenderLoop(config) {
            currentConfig = config;
            canvasCore.width = config.template.config.canvasW;
            canvasCore.height = config.template.config.canvasH;
            planeCore.setAttribute('width', config.template.config.planeW);
            planeCore.setAttribute('height', config.template.config.planeH);

            if (renderLoop) clearInterval(renderLoop);

            function tick(cfg) {
                if (!cfg || !cfg.template) return;
                cfg.template.fetchDati((dati) => {
                    cfg.template.draw(ctx, dati, cfg);
                    if (planeCore.getObject3D('mesh')) {
                        planeCore.getObject3D('mesh').material.map.needsUpdate = true;
                    }
                });
            }

            tick(config);
            renderLoop = setInterval(() => tick(currentConfig), 1000);
        }

        let isPinned = false;
        const uiControls = document.getElementById('ui-controls');
        const scaleZoom = [0.5, 0.75, 1.0, 1.5, 2.0];
        let indiceZoom = 2;

        function cambiaZoom(direzione) {
            indiceZoom += direzione;
            if (indiceZoom < 0) indiceZoom = 0;
            if (indiceZoom >= scaleZoom.length) indiceZoom = scaleZoom.length - 1;
            const s = scaleZoom[indiceZoom];
            content3D.setAttribute('scale', `${s} ${s} ${s}`);
        }

        document.querySelectorAll('.ar-marker').forEach(markerEl => {
            markerEl.addEventListener('markerFound', async (e) => {
                // Prendi il markerId in modo sicuro (stringa ed elimina spazi accidentali)
                const markerId = String(markerEl.getAttribute('value') || '').trim();

                const config = registroMacchinari[markerId];

                // CATCH SILENZIOSO: AR.js spesso "allucina" barcode inesistenti nel video (falsi positivi).
                // Un alert() blocca tutto il thread del browser! Usiamo console.warn per ignorarlo in sicurezza.
                if (!config) {
                    console.warn(`⚠️ Rilevato Marker ID "${markerId}", ma non esiste in anagrafica. Ignorato silenziosamente.`);
                    return;
                }

                try {
                    const templateObj = await caricaTemplateJS(config.template_file, config.template_obj);
                    config.template = templateObj;

                    if (content3D.parentNode !== markerEl) {
                        markerEl.appendChild(content3D);
                        // Reset robusto dello zoom quando si cambia marker
                        content3D.setAttribute('scale', '1 1 1');
                        indiceZoom = 2;
                    }
                    content3D.setAttribute('visible', 'true');

                    startRenderLoop(config);
                    if (!isPinned) uiControls.style.display = 'flex';

                } catch (errore) {
                    alert(`⚠️ IMPOSSIBILE CARICARE IL GRAFICO: Assicurati che il file ${config.template_file} esista!`);
                    console.error(errore);
                }
            });

            markerEl.addEventListener('markerLost', () => {
                if (!isPinned) {
                    uiControls.style.display = 'none';
                    content3D.setAttribute('visible', 'false');
                    if (renderLoop) clearInterval(renderLoop);
                }
            });
        });

        // --- Logica Pin e Grafici invariata dal blocco precedente ---
        function pinToScreen() {
            isPinned = true;
            uiControls.style.display = 'none';
            document.getElementById('hud-modal').style.display = 'flex';
            content3D.setAttribute('visible', 'false');
            document.getElementById('main-view-container').appendChild(canvasCore);
            canvasCore.classList.add('canvas-pinned');
        }

        function unpinFromScreen() {
            isPinned = false;
            document.getElementById('hud-modal').style.display = 'none';
            chiudiDettaglio();
            document.body.appendChild(canvasCore);
            canvasCore.classList.remove('canvas-pinned');
            content3D.setAttribute('visible', 'true');

            if (content3D.parentNode && content3D.parentNode.object3D.visible) {
                uiControls.style.display = 'flex';
            } else {
                content3D.setAttribute('visible', 'false');
                if (renderLoop) clearInterval(renderLoop);
            }
        }

        canvasCore.addEventListener('click', (event) => {
            if (!isPinned || !currentConfig) return;
            const rect = canvasCore.getBoundingClientRect();
            const scaleX = canvasCore.width / rect.width;
            const scaleY = canvasCore.height / rect.height;
            const clickX = (event.clientX - rect.left) * scaleX;
            const clickY = (event.clientY - rect.top) * scaleY;
            const hitboxes = currentConfig.template.hitboxes || [];
            for (let box of hitboxes) {
                if (clickX >= box.x && clickX <= box.x + box.w && clickY >= box.y && clickY <= box.y + box.h) {
                    apriDettaglio(box.id); break;
                }
            }
        });

        let detailChart = null;
        function apriDettaglio(metricaId) {
            document.getElementById('main-view-container').style.display = 'none';
            document.getElementById('detail-view').style.display = 'flex';
            let titolo = metricaId.toUpperCase();
            if (metricaId === 'iaq_score') titolo = "QUALITA' DELL'ARIA";
            document.getElementById('detail-title').innerText = "Andamento: " + titolo;
            let baseVal = 0, variazione = 0, unita = "";
            if (metricaId === 'temperatura') { baseVal = 19; variazione = 4; unita = "°C"; }
            else if (metricaId === 'umidita') { baseVal = 40; variazione = 15; unita = "%"; }
            else if (metricaId === 'rumore') { baseVal = 40; variazione = 20; unita = "dB"; }
            else if (metricaId === 'luce') { baseVal = 400; variazione = 150; unita = "lux"; }
            else if (metricaId === 'iaq_score') { baseVal = 8.5; variazione = 0.8; unita = "Punti"; }
            const fakeData = [];
            for (let i = 0; i < 10; i++) {
                const trend = Math.sin(i / 9 * Math.PI) * variazione;
                const rumoreDiff = (Math.random() * variazione * 0.3) - (variazione * 0.15);
                fakeData.push((baseVal + trend + rumoreDiff).toFixed(1));
            }
            const labels = ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', 'Ora'];
            const ctxChart = document.getElementById('chart-canvas').getContext('2d');
            if (detailChart) detailChart.destroy();
            detailChart = new Chart(ctxChart, {
                type: 'line', data: { labels: labels, datasets: [{ label: metricaId, data: fakeData, borderColor: '#22c55e', backgroundColor: 'rgba(34, 197, 94, 0.2)', fill: true, tension: 0.4, borderWidth: 4, pointRadius: 6 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { title: { display: true, text: unita, font: { size: 14, weight: 'bold' } }, ticks: { maxTicksLimit: 6 }, beginAtZero: false } } }
            });
        }
        function chiudiDettaglio() { document.getElementById('detail-view').style.display = 'none'; document.getElementById('main-view-container').style.display = 'block'; }
    </script>
</body>

</html>
